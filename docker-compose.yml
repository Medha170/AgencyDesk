version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: agencydesk_db
    restart: always
    environment:
      POSTGRES_USER: agencydesk
      POSTGRES_PASSWORD: agencydesk_secret
      POSTGRES_DB: agencydesk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: